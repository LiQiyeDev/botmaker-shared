name: Release
on:
  push:
    tags:
      - '*'

jobs:
  # JitPack builds the artifact itself from the pushed tag; this just asks it
  # to start eagerly so the first consumer (the SDK / Studio build) doesn't wait.
  # No secrets required.
  trigger-jitpack:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger JitPack build for ${{ github.ref_name }}
        run: |
          curl -sf "https://jitpack.io/api/builds/com.github.${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.ref_name }}" || true
